<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="/style.css">
    <link rel="stylesheet" href="/spe.css">
    <title>my discord</title>
    <style>
        * {
            transition: 0.6s
        }

        body {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        header {
            position: absolute;
            top: 120px;
        }

        a {
            position: absolute;
            bottom: 120px;
        }

        h1 {
            font-size: 100px;
        }

        h1:hover {
            font-size: 150px;
        }
    </style>
</head>

<body>
    
    <header>
        <p>\/ Click on to copie \/</p>
    </header>

    <h1 id="h1">enrevoir15</h1>
    <a href="/index.html">Go back</a>

    <script>
        const me = document.querySelector("#h1");

        me.addEventListener("click", async () => {
            try {
                await navigator.clipboard.writeText(me.textContent);
            } catch (err) {
                console.error('Erreur lors de la copie du texte: ', err);
            }
        });
    </script>
</body>

</html>
